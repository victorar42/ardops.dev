name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lhci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lhci:
    name: Lighthouse (${{ matrix.preset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [desktop, mobile]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - name: Run Lighthouse CI
        env:
          LHCI_PRESET: ${{ matrix.preset }}
        run: |
          npx --yes @lhci/cli@0.14.x autorun \
            --config=tests/lighthouserc.json \
            --collect.settings.preset="${LHCI_PRESET}"
