name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  html-validate:
    name: HTML validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - run: npx html-validate index.html blog/index.html talks/index.html 404.html

  a11y:
    name: Accessibility (axe-core · WCAG 2.1 AA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - name: Start static server
        run: |
          npx --yes serve -l 8080 . &
          sleep 3
      - run: node tests/a11y.js

  lychee:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config tests/links.config.toml
            --root-dir ${{ github.workspace }}
            ./*.html
            ./blog/*.html
            ./talks/*.html
          fail: true

  forbidden-urls:
    name: Forbidden URLs gate (spec 002)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run forbidden-urls gate
        run: bash tests/forbidden-urls.sh
