name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  html-validate:
    name: HTML validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - name: Build interviews (with fixtures)
        run: node scripts/build-interviews.js --strict --include-fixtures --out interviews/
      - name: Validate site HTML
        run: npx html-validate index.html blog/index.html talks/index.html 404.html
      - name: Validate emitted interviews HTML
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(interviews/*.html)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no interviews HTML emitted; skipping"
            exit 0
          fi
          npx html-validate "${files[@]}"

  a11y:
    name: Accessibility (axe-core · WCAG 2.1 AA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - name: Build interviews (with fixtures)
        run: node scripts/build-interviews.js --strict --include-fixtures --out interviews/
      - name: Start static server
        run: |
          npx --yes serve -l 8080 . &
          sleep 3
      - run: node tests/a11y.js

  lychee:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config tests/links.config.toml
            --root-dir ${{ github.workspace }}
            ./*.html
            ./blog/*.html
            ./talks/*.html
          fail: true

  forbidden-urls:
    name: Forbidden URLs gate (spec 002)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run forbidden-urls gate
        run: bash tests/forbidden-urls.sh

  interviews-xss:
    name: Interviews XSS gate (spec 003)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - name: Build interviews (with fixtures)
        run: node scripts/build-interviews.js --strict --include-fixtures --out interviews/
      - name: Run interviews-xss gate
        run: bash tests/interviews-xss.sh

  interviews-size:
    name: Interviews index.json size gate (spec 003)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - name: Build interviews
        run: node scripts/build-interviews.js --strict --out interviews/
      - name: Run interviews-size gate
        run: bash tests/interviews-size.sh

  interviews-strict-build:
    name: Interviews strict build (spec 003)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - name: Strict build (production set, no fixtures)
        run: node scripts/build-interviews.js --strict --out interviews/

  interviews-negative:
    name: Interviews negative validator gate (spec 003)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - name: Run interviews-negative gate
        run: bash tests/interviews-negative.sh

  no-placeholders:
    name: No placeholders gate (spec 004)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run no-placeholders gate
        run: bash tests/no-placeholders.sh

  pipeline-build-check:
    name: Pipeline build & schema gate (spec 005)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify index.html in sync with content/pipeline.json
        run: node scripts/build-pipeline.js --check
      - name: Run pipeline schema negative-fixture gate
        run: bash tests/pipeline-schema.sh

  blog-build-check:
    name: Blog build & schema gate (spec 006)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - name: Verify landing + /blog/ in sync with content/blog/
        run: node scripts/build-blog.js --check
      - name: Run blog schema negative-fixture + XSS gate
        run: bash tests/blog-schema.sh

  nav-consistency:
    name: Nav & footer consistency gate (spec 008)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - name: Verify static pages in sync with scripts/lib/layout.js
        run: node scripts/build-layout.js --check
      - name: Build blog (so blog/*.html exist for the gate)
        run: node scripts/build-blog.js
      - name: Build interviews with fixtures (so interviews/*.html exist)
        run: node scripts/build-interviews.js --strict --include-fixtures --out interviews/
      - name: Run nav-consistency gate
        run: bash tests/nav-consistency.sh

  csp-no-unsafe-inline:
    name: CSP no-unsafe-inline gate (spec 009)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - name: Build blog (so blog/*.html exist for the gate)
        run: node scripts/build-blog.js
      - name: Build interviews (so interviews/*.html exist)
        run: node scripts/build-interviews.js --strict --out interviews/
      - name: Run csp-no-unsafe-inline gate
        run: bash tests/csp-no-unsafe-inline.sh

  external-links:
    name: External links anti-tabnabbing gate (spec 009)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - name: Build blog (so blog/*.html exist for the gate)
        run: node scripts/build-blog.js
      - name: Build interviews (so interviews/*.html exist)
        run: node scripts/build-interviews.js --strict --out interviews/
      - name: Run external-links gate
        run: bash tests/external-links.sh

  sitemap-drift:
    name: Sitemap drift gate (spec 009)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - name: Build blog (so blog/*.html exist for the gate)
        run: node scripts/build-blog.js
      - name: Build interviews (so interviews/*.html and interviews/sitemap.xml exist)
        run: node scripts/build-interviews.js --strict --out interviews/
      - name: Run sitemap-drift gate
        run: bash tests/sitemap-drift.sh

  feed-validate:
    name: Feed validate gate (spec 011)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - name: Build blog (so blog/feed.{xml,json} exist)
        run: node scripts/build-blog.js
      - name: Run feed-validate gate
        run: bash tests/feed-validate.sh

  jsonld-validate:
    name: JSON-LD validate gate (spec 011)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - name: Build blog (so blog/*.html exist)
        run: node scripts/build-blog.js
      - name: Build interviews (so interviews/*.html exist)
        run: node scripts/build-interviews.js --strict --out interviews/
      - name: Run jsonld-validate gate
        run: bash tests/jsonld-validate.sh

  seo-meta:
    name: SEO meta gate (spec 011)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install --no-audit --no-fund
      - name: Build blog (so blog/*.html exist)
        run: node scripts/build-blog.js
      - name: Build interviews (so interviews/*.html exist)
        run: node scripts/build-interviews.js --strict --out interviews/
      - name: Run seo-meta gate
        run: bash tests/seo-meta.sh

  headshot-size:
    name: Headshot size gate (spec 012)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run headshot-size gate
        run: bash tests/headshot-size.sh

  now-freshness:
    name: Now freshness gate (spec 013)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run now-freshness gate
        run: bash tests/now-freshness.sh
